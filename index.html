
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Special+Elite&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .safe-scene {
    width: 100%; min-height: 700px; background: #111009;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 20px 56px; font-family: 'Oswald', sans-serif;
    position: relative; overflow: hidden;
  }
  .bg-glow {
    position: absolute; width: 600px; height: 400px; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    background: radial-gradient(ellipse, #2a2010 0%, transparent 70%);
    pointer-events: none;
  }
  .wall-lines {
    position: absolute; inset: 0; opacity: 0.04; pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 39px,#c8a87a 39px,#c8a87a 40px),
      repeating-linear-gradient(90deg,transparent,transparent 39px,#c8a87a 39px,#c8a87a 40px);
  }
  .safe-body { position: relative; width: 380px; }
  .safe-outer {
    position: relative; width: 380px; height: 460px;
    background: linear-gradient(160deg,#3e3830 0%,#242018 50%,#322e28 100%);
    border-radius: 14px 14px 10px 10px; border: 2.5px solid #4a4238;
    box-shadow: 0 30px 80px rgba(0,0,0,0.9),0 0 0 1px #1a1810,inset 0 1px 0 #5a5040,inset 0 -1px 0 #1a1810;
  }
  .safe-engraving {
    position: absolute; top: 6px; left: 0; right: 0; text-align: center;
    font-family: 'Special Elite',cursive; font-size: 10px; letter-spacing: 3.5px;
    color: #6a5e48; text-shadow: 0 1px 0 rgba(0,0,0,0.8),0 -1px 0 rgba(255,255,255,0.04);
    text-transform: uppercase; pointer-events: none; user-select: none; z-index: 10;
  }
  .safe-interior {
    position: absolute; top: 28px; left: 24px; right: 24px; bottom: 24px;
    background: linear-gradient(135deg,#1a1208 0%,#2a1e10 100%);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    border: 1px solid #3a2a18;
  }
  .note {
    width: 140px; height: 100px; background: #f0e4cc; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transform: rotate(-4deg);
    box-shadow: 3px 4px 12px rgba(0,0,0,0.6);
    position: relative; opacity: 0; scale: 0.8;
    transition: opacity 0.6s 0.9s, scale 0.6s 0.9s, transform 0.2s, box-shadow 0.2s;
    font-family: 'Special Elite',cursive; font-size: 12px; color: #3a2a18;
    text-align: center; padding: 10px; line-height: 1.5; user-select: none;
  }
  .note.visible { opacity: 1; scale: 1; }
  .note:hover { transform: rotate(-1deg) scale(1.07); box-shadow: 6px 8px 20px rgba(0,0,0,0.7); }
  .note-lines { position: absolute; top: 14px; left: 12px; right: 12px; bottom: 10px; pointer-events: none; }
  .note-line { height: 1px; background: rgba(100,70,40,0.18); margin-bottom: 11px; }
  .note-txt { position: relative; z-index: 1; }
  .safe-door {
    position: absolute; top: 28px; left: 24px; right: 24px; bottom: 24px;
    background: linear-gradient(150deg,#4a4438 0%,#302c26 60%,#3e3a34 100%);
    border-radius: 8px; border: 2px solid #3a3428;
    transform-origin: left center; transform: perspective(1000px) rotateY(0deg);
    transition: transform 1.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
  }
  .safe-door.open { transform: perspective(1000px) rotateY(-115deg); }
  .rivets { position: absolute; inset: 0; pointer-events: none; }
  .rivet {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%,#706050,#2a2520); border: 1px solid #3a3428;
  }
  .door-handle {
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 66px;
    background: linear-gradient(180deg,#9a8a70 0%,#5a4e3c 50%,#9a8a70 100%);
    border-radius: 9px; border: 1px solid #3a3428;
    box-shadow: 0 3px 8px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .dial-area {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-55%,-54%);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .dial-ring {
    width: 90px; height: 90px; border-radius: 50%;
    background: radial-gradient(circle at 38% 33%,#7a6e5c,#342e28);
    border: 4px solid #4a4238;
    box-shadow: 0 6px 16px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center; position: relative;
    transition: transform 0.35s cubic-bezier(0.2,0.8,0.3,1);
  }
  .dial-ring::before {
    content: ''; position: absolute; inset: 8px; border-radius: 50%;
    background: radial-gradient(circle at 38% 33%,#5a5040,#2a2520); border: 1px solid #3a3020;
  }
  .dial-tick {
    position: absolute; width: 2px; height: 9px; background: #8a7860;
    border-radius: 1px; top: 5px; left: 50%; transform-origin: 50% 40px; margin-left: -1px;
  }
  .dial-center {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    background: #d4a870; border: 1.5px solid #8a6840; z-index: 2;
  }
  .keypad { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .keypad-display {
    width: 150px; height: 36px; background: #0c1608;
    border: 1px solid #2a3c20; border-radius: 4px;
    display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 8px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.9),0 0 6px rgba(40,120,40,0.15);
    margin-bottom: 4px; padding: 0 10px;
  }
  .digit-cell {
    font-family: 'Courier New',monospace; font-size: 18px; font-weight: bold;
    color: #44ee60; width: 16px; text-align: center; line-height: 1; flex-shrink: 0;
  }
  .digit-cell.err { color: #d06050; }
  .keypad-row { display: flex; gap: 6px; }
  .key-btn {
    width: 32px; height: 32px;
    background: linear-gradient(160deg,#5a5040,#2e2a24);
    border: 1px solid #4a4238; border-radius: 5px;
    color: #c8b890; font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald',sans-serif;
    box-shadow: 0 3px 5px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06);
    user-select: none; transition: transform 0.1s, background 0.1s;
  }
  .key-btn:active { background: linear-gradient(160deg,#3a3428,#1e1c18); transform: scale(0.93) translateY(1px); }
  .key-btn.clr { background: linear-gradient(160deg,#5a3830,#2e1e18); color: #e88060; }
  .status-msg {
    font-size: 11px; letter-spacing: 2px; text-align: center;
    height: 16px; transition: color 0.3s; margin-top: 2px;
  }
  .status-msg.err { color: #d06050; }
  .status-msg.ok  { color: #60cc70; }
  .status-msg.idle{ color: #5a4e40; }
  .safe-base {
    width: 360px; height: 16px;
    background: linear-gradient(180deg,#2a2620 0%,#1a1810 100%);
    border-radius: 0 0 8px 8px; border: 2px solid #3a3428; border-top: none; margin-top: -2px;
  }
  .safe-shadow {
    width: 320px; height: 24px;
    background: radial-gradient(ellipse,rgba(0,0,0,0.7) 0%,transparent 70%); margin-top: 2px;
  }
  .novella-overlay {
    position: absolute; inset: 0; background: rgba(10,8,4,0.94);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 100;
  }
  .novella-overlay.show { opacity: 1; pointer-events: all; }
  .novella-text {
    font-family: 'Special Elite',cursive; color: #ede0c0;
    font-size: 52px; letter-spacing: 10px; text-align: center;
    animation: flicker 4s infinite;
  }
  @keyframes flicker {
    0%,100%{opacity:1}91%{opacity:1}92%{opacity:0.5}93%{opacity:1}96%{opacity:0.65}97%{opacity:1}
  }
  .overlay-hint {
    margin-top: 32px; font-size: 11px; letter-spacing: 3px;
    color: #4a4030; font-family: 'Oswald',sans-serif; text-transform: uppercase;
  }
</style>

<div class="safe-scene">
  <div class="bg-glow"></div>
  <div class="wall-lines"></div>
  <div class="safe-body">
    <div class="safe-outer">
      <div class="safe-engraving">ЛУЧШИЕ НЕЙРО-РАМЕНЫ!</div>
      <div class="safe-interior">
        <div class="note" id="note">
          <div class="note-lines">
            <div class="note-line"></div><div class="note-line"></div>
            <div class="note-line"></div><div class="note-line"></div><div class="note-line"></div>
          </div>
          <div class="note-txt">нажми<br>на меня</div>
        </div>
      </div>
      <div class="safe-door" id="safeDoor">
        <div class="rivets">
          <div class="rivet" style="top:14px;left:14px"></div>
          <div class="rivet" style="top:14px;right:14px"></div>
          <div class="rivet" style="bottom:14px;left:14px"></div>
          <div class="rivet" style="bottom:14px;right:14px"></div>
          <div class="rivet" style="top:50%;margin-top:-6px;left:14px"></div>
          <div class="rivet" style="top:50%;margin-top:-6px;right:14px"></div>
        </div>
        <div class="door-handle"></div>
        <div class="dial-area">
          <div class="dial-ring" id="dialRing">
            <div class="dial-tick" style="transform:rotate(0deg)"></div>
            <div class="dial-tick" style="transform:rotate(30deg)"></div>
            <div class="dial-tick" style="transform:rotate(60deg)"></div>
            <div class="dial-tick" style="transform:rotate(90deg)"></div>
            <div class="dial-tick" style="transform:rotate(120deg)"></div>
            <div class="dial-tick" style="transform:rotate(150deg)"></div>
            <div class="dial-tick" style="transform:rotate(180deg)"></div>
            <div class="dial-tick" style="transform:rotate(210deg)"></div>
            <div class="dial-tick" style="transform:rotate(240deg)"></div>
            <div class="dial-tick" style="transform:rotate(270deg)"></div>
            <div class="dial-tick" style="transform:rotate(300deg)"></div>
            <div class="dial-tick" style="transform:rotate(330deg)"></div>
            <div class="dial-center"></div>
          </div>
          <div class="keypad">
            <div class="keypad-display">
              <span class="digit-cell" id="d0">-</span>
              <span class="digit-cell" id="d1">-</span>
              <span class="digit-cell" id="d2">-</span>
              <span class="digit-cell" id="d3">-</span>
              <span class="digit-cell" id="d4">-</span>
            </div>
            <div class="keypad-row">
              <button class="key-btn" data-k="1">1</button>
              <button class="key-btn" data-k="2">2</button>
              <button class="key-btn" data-k="3">3</button>
            </div>
            <div class="keypad-row">
              <button class="key-btn" data-k="4">4</button>
              <button class="key-btn" data-k="5">5</button>
              <button class="key-btn" data-k="6">6</button>
            </div>
            <div class="keypad-row">
              <button class="key-btn" data-k="7">7</button>
              <button class="key-btn" data-k="8">8</button>
              <button class="key-btn" data-k="9">9</button>
            </div>
            <div class="keypad-row">
              <button class="key-btn clr" id="btnClear">✕</button>
              <button class="key-btn" data-k="0">0</button>
              <button class="key-btn" style="visibility:hidden"></button>
            </div>
            <div class="status-msg idle" id="statusMsg">· · · · ·</div>
          </div>
        </div>
      </div>
    </div>
    <div class="safe-base"></div>
    <div class="safe-shadow"></div>
  </div>
  <div class="novella-overlay" id="novellaOverlay">
    <div class="novella-text">новелла.</div>
    <div class="overlay-hint">нажми чтобы закрыть</div>
  </div>
</div>

<script>
(function() {
  const CODE = '27882';
  let entered = '';
  let isOpen = false;
  let dialAngle = 0;

  function cell(i) { return document.getElementById('d' + i); }
  function msg() { return document.getElementById('statusMsg'); }

  function updateDisplay() {
    for (let i = 0; i < 5; i++) {
      cell(i).textContent = i < entered.length ? entered[i] : '-';
    }
  }

  function spinDial() {
    dialAngle += 40 + Math.random() * 40;
    document.getElementById('dialRing').style.transform = 'rotate(' + dialAngle + 'deg)';
  }

  function pressKey(digit) {
    if (isOpen || entered.length >= 5) return;
    entered += digit;
    spinDial();
    updateDisplay();
    if (entered.length === 5) setTimeout(checkCode, 350);
  }

  function clearCode() {
    if (isOpen) return;
    entered = '';
    updateDisplay();
    for (let i = 0; i < 5; i++) cell(i).className = 'digit-cell';
    msg().textContent = '· · · · ·';
    msg().className = 'status-msg idle';
  }

  function checkCode() {
    if (entered === CODE) {
      msg().textContent = 'ОТКРЫТО';
      msg().className = 'status-msg ok';
      isOpen = true;
      dialAngle += 900;
      var ring = document.getElementById('dialRing');
      ring.style.transition = 'transform 1s cubic-bezier(0.4,0,0.2,1)';
      ring.style.transform = 'rotate(' + dialAngle + 'deg)';
      setTimeout(function() {
        document.getElementById('safeDoor').classList.add('open');
        setTimeout(function() {
          document.getElementById('note').classList.add('visible');
        }, 700);
      }, 500);
    } else {
      msg().textContent = 'НЕВЕРНО';
      msg().className = 'status-msg err';
      for (let i = 0; i < 5; i++) cell(i).className = 'digit-cell err';
      var door = document.getElementById('safeDoor');
      door.style.transition = 'transform 0.08s';
      var si = 0, shakes = [3,-5,5,-4,3,0];
      function shake() {
        if (si >= shakes.length) {
          door.style.transform = 'perspective(1000px) rotateY(0deg)';
          door.style.transition = 'transform 1.4s cubic-bezier(0.4,0,0.2,1)';
          return;
        }
        door.style.transform = 'perspective(1000px) rotateY(' + shakes[si++] + 'deg)';
        setTimeout(shake, 80);
      }
      shake();
      setTimeout(function() {
        entered = '';
        updateDisplay();
        for (let i = 0; i < 5; i++) cell(i).className = 'digit-cell';
        msg().textContent = '· · · · ·';
        msg().className = 'status-msg idle';
      }, 900);
    }
  }

  document.querySelectorAll('[data-k]').forEach(function(btn) {
    btn.addEventListener('click', function() { pressKey(btn.getAttribute('data-k')); });
  });

  document.getElementById('btnClear').addEventListener('click', clearCode);

  document.getElementById('note').addEventListener('click', function() {
    if (isOpen) document.getElementById('novellaOverlay').classList.add('show');
  });

  document.getElementById('novellaOverlay').addEventListener('click', function() {
    document.getElementById('novellaOverlay').classList.remove('show');
  });

  updateDisplay();
})();
</script>
